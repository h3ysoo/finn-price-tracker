name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: finn
          POSTGRES_PASSWORD: finn
          POSTGRES_DB: finn_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U finn"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      TEST_DATABASE_URL: postgresql+psycopg://finn:finn@localhost:5432/finn_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements-dev.txt
      - name: Install Playwright Chromium
        run: python -m playwright install --with-deps chromium
      - name: Run tests
        run: pytest -q

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: finn-price-tracker:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
