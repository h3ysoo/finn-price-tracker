services:
  web:
    build: .
    ports:
      - "8501:8501"
    # ANTHROPIC_API_KEY (and any config overrides) come from .env
    env_file: .env
    environment:
      DATA_DIR: /app/data
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql+psycopg://finn:finn@db:5432/finn
    volumes:
      - finn-data:/app/data
    depends_on:
      redis:
        condition: service_started
      db:
        condition: service_healthy
    restart: unless-stopped

  # Executes search jobs (Playwright browser runs HERE, not in web).
  # One worker process = one job at a time; scale with --scale worker=2
  # only if the host has RAM for a second Chromium.
  worker:
    build: .
    command: ["rq", "worker", "searches", "--url", "redis://redis:6379/0"]
    env_file: .env
    environment:
      DATA_DIR: /app/data
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql+psycopg://finn:finn@db:5432/finn
    volumes:
      - finn-data:/app/data
    depends_on:
      redis:
        condition: service_started
      db:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: finn
      POSTGRES_PASSWORD: finn
      POSTGRES_DB: finn
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finn"]
      interval: 10s
      timeout: 3s
      retries: 10

volumes:
  finn-data:
  pgdata:
